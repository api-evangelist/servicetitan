naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Sales API — Estimates
  description: ServiceTitan Sales — Estimates and proposals.
  tags: [ServiceTitan, Sales, Estimates]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: sales-estimates
    baseUri: https://api.servicetitan.io
    resources:
    - name: estimates
      path: /sales/v2/{{env.SERVICETITAN_TENANT_ID}}/estimates
      operations:
      - name: listEstimates
        method: GET
        description: List estimates
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: jobId, in: query, type: integer }
        - { name: modifiedOnOrAfter, in: query, type: string }
      - name: createEstimate
        method: POST
        description: Create an estimate
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: body, in: body, type: object, required: true }
    - name: estimates-by-id
      path: /sales/v2/{{env.SERVICETITAN_TENANT_ID}}/estimates/{id}
      operations:
      - name: getEstimate
        method: GET
        description: Get an estimate
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: sales-estimates-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-estimates, description: List estimates, hints: { readOnly: true, destructive: false, idempotent: true }, call: sales-estimates.listEstimates, with: { jobId: tools.jobId, modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-estimate, description: Get an estimate, hints: { readOnly: true, destructive: false, idempotent: true }, call: sales-estimates.getEstimate, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-estimate, description: Create an estimate, hints: { readOnly: false, destructive: false, idempotent: false }, call: sales-estimates.createEstimate, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
