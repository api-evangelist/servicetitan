naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Payroll API — Adjustments
  description: ServiceTitan Payroll — Payroll adjustments and gross-pay items.
  tags: [ServiceTitan, Payroll, Adjustments]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: payroll-payroll-adjustments
    baseUri: https://api.servicetitan.io
    resources:
    - name: payroll-adjustments
      path: /payroll/v2/{{env.SERVICETITAN_TENANT_ID}}/payroll-adjustments
      operations:
      - name: listAdjustments
        method: GET
        description: List payroll adjustments
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: modifiedOnOrAfter, in: query, type: string }
      - name: createAdjustment
        method: POST
        description: Create a payroll adjustment
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: body, in: body, type: object, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: payroll-payroll-adjustments-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-adjustments, description: List payroll adjustments, hints: { readOnly: true, destructive: false, idempotent: true }, call: payroll-payroll-adjustments.listAdjustments, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-adjustment, description: Create a payroll adjustment, hints: { readOnly: false, destructive: false, idempotent: false }, call: payroll-payroll-adjustments.createAdjustment, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
