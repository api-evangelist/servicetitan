naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Accounting API — Invoices
  description: ServiceTitan Accounting — Invoices. List, get, update, update items.
  tags: [ServiceTitan, Accounting, Invoices]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: accounting-invoices
    baseUri: https://api.servicetitan.io
    resources:
    - name: invoices
      path: /accounting/v2/{{env.SERVICETITAN_TENANT_ID}}/invoices
      operations:
      - name: listInvoices
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: jobId, in: query, type: integer }
        - { name: customerId, in: query, type: integer }
        - { name: modifiedOnOrAfter, in: query, type: string }
    - name: invoice-by-id
      path: /accounting/v2/{{env.SERVICETITAN_TENANT_ID}}/invoices/{id}
      operations:
      - name: getInvoice
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: id, in: path, type: integer, required: true } ]
      - name: updateInvoice
        method: PATCH
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: accounting-invoices-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-invoices, description: List invoices, hints: { readOnly: true, destructive: false, idempotent: true }, call: accounting-invoices.listInvoices, with: { jobId: tools.jobId, customerId: tools.customerId, modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-invoice, description: Get an invoice, hints: { readOnly: true, destructive: false, idempotent: true }, call: accounting-invoices.getInvoice, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-update-invoice, description: Update an invoice, hints: { readOnly: false, destructive: false, idempotent: false }, call: accounting-invoices.updateInvoice, with: { id: tools.id, body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
