naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan CRM API — Leads
  description: ServiceTitan CRM API — Leads. List, create, dismiss operations.
  tags:
  - ServiceTitan
  - CRM
  - Leads
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: crm-leads
    baseUri: https://api.servicetitan.io
    description: ServiceTitan CRM Leads.
    resources:
    - name: leads
      path: /crm/v2/{{env.SERVICETITAN_TENANT_ID}}/leads
      operations:
      - name: listLeads
        method: GET
        description: List Leads
        outputRawFormat: json
        outputParameters:
        - { name: result, type: object, value: $. }
        inputParameters:
        - { name: status, in: query, type: string }
        - { name: page, in: query, type: integer }
      - name: createLead
        method: POST
        description: Create Lead
        outputRawFormat: json
        outputParameters:
        - { name: result, type: object, value: $. }
        inputParameters:
        - { name: body, in: body, type: object, required: true }
    - name: lead-dismiss
      path: /crm/v2/{{env.SERVICETITAN_TENANT_ID}}/leads/{id}/dismiss
      operations:
      - name: dismissLead
        method: PUT
        description: Dismiss Lead
        outputRawFormat: json
        outputParameters:
        - { name: result, type: object, value: $. }
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: crm-leads-mcp
    port: 9090
    transport: http
    description: MCP adapter for Leads.
    tools:
    - { name: servicetitan-list-leads, description: List leads, hints: { readOnly: true, destructive: false, idempotent: true }, call: crm-leads.listLeads, with: { status: tools.status, page: tools.page }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-lead, description: Create a lead, hints: { readOnly: false, destructive: false, idempotent: false }, call: crm-leads.createLead, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-dismiss-lead, description: Dismiss a lead, hints: { readOnly: false, destructive: false, idempotent: true }, call: crm-leads.dismissLead, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
