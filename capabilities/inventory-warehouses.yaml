naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Inventory API — Warehouses
  description: ServiceTitan Inventory — Warehouses (read-only listing).
  tags: [ServiceTitan, Inventory, Warehouses]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: inventory-warehouses
    baseUri: https://api.servicetitan.io
    resources:
    - name: warehouses
      path: /inventory/v2/{{env.SERVICETITAN_TENANT_ID}}/warehouses
      operations:
      - name: listWarehouses
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: []
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: inventory-warehouses-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-warehouses, description: List warehouses, hints: { readOnly: true, destructive: false, idempotent: true }, call: inventory-warehouses.listWarehouses, with: {}, outputParameters: [ { type: object, mapping: $. } ] }
