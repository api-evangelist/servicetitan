naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Inventory API — Purchase Orders
  description: ServiceTitan Inventory — Purchase Orders (list/get/create).
  tags: [ServiceTitan, Inventory, Purchase Orders]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: inventory-purchase-orders
    baseUri: https://api.servicetitan.io
    resources:
    - name: purchase-orders
      path: /inventory/v2/{{env.SERVICETITAN_TENANT_ID}}/purchase-orders
      operations:
      - name: listPurchaseOrders
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: vendorId, in: query, type: integer }
        - { name: status, in: query, type: string }
        - { name: modifiedOnOrAfter, in: query, type: string }
      - name: createPurchaseOrder
        method: POST
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: body, in: body, type: object, required: true } ]
    - name: po-by-id
      path: /inventory/v2/{{env.SERVICETITAN_TENANT_ID}}/purchase-orders/{id}
      operations:
      - name: getPurchaseOrder
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: id, in: path, type: integer, required: true } ]
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: inventory-purchase-orders-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-purchase-orders, description: List purchase orders, hints: { readOnly: true, destructive: false, idempotent: true }, call: inventory-purchase-orders.listPurchaseOrders, with: { vendorId: tools.vendorId, status: tools.status, modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-purchase-order, description: Get a purchase order, hints: { readOnly: true, destructive: false, idempotent: true }, call: inventory-purchase-orders.getPurchaseOrder, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-purchase-order, description: Create a purchase order, hints: { readOnly: false, destructive: false, idempotent: false }, call: inventory-purchase-orders.createPurchaseOrder, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
