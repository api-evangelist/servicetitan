naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Service Agreements API
  description: ServiceTitan Service Agreements — Commercial recurring contracts.
  tags: [ServiceTitan, Service Agreements, Commercial]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: serviceagreements-service-agreements
    baseUri: https://api.servicetitan.io
    resources:
    - name: service-agreements
      path: /serviceagreements/v2/{{env.SERVICETITAN_TENANT_ID}}/service-agreements
      operations:
      - name: listServiceAgreements
        method: GET
        description: List service agreements
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: modifiedOnOrAfter, in: query, type: string }
        - { name: status, in: query, type: string }
    - name: service-agreements-by-id
      path: /serviceagreements/v2/{{env.SERVICETITAN_TENANT_ID}}/service-agreements/{id}
      operations:
      - name: getServiceAgreement
        method: GET
        description: Get a service agreement
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: serviceagreements-service-agreements-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-service-agreements, description: List service agreements, hints: { readOnly: true, destructive: false, idempotent: true }, call: serviceagreements-service-agreements.listServiceAgreements, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter, status: tools.status }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-service-agreement, description: Get a service agreement, hints: { readOnly: true, destructive: false, idempotent: true }, call: serviceagreements-service-agreements.getServiceAgreement, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
