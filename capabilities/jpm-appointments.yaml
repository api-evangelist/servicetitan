naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan JPM API — Appointments
  description: ServiceTitan JPM — Appointments. List, get, create, update, reschedule.
  tags:
  - ServiceTitan
  - JPM
  - Appointments
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: jpm-appointments
    baseUri: https://api.servicetitan.io
    resources:
    - name: appointments
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/appointments
      operations:
      - name: listAppointments
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: jobId, in: query, type: integer }
        - { name: modifiedOnOrAfter, in: query, type: string }
      - name: createAppointment
        method: POST
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: body, in: body, type: object, required: true } ]
    - name: appointment-by-id
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/appointments/{id}
      operations:
      - name: getAppointment
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: id, in: path, type: integer, required: true } ]
      - name: updateAppointment
        method: PATCH
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
    - name: appointment-reschedule
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/appointments/{id}/reschedule
      operations:
      - name: rescheduleAppointment
        method: PATCH
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: jpm-appointments-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-appointments, description: List job appointments, hints: { readOnly: true, destructive: false, idempotent: true }, call: jpm-appointments.listAppointments, with: { jobId: tools.jobId, modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-appointment, description: Get an appointment, hints: { readOnly: true, destructive: false, idempotent: true }, call: jpm-appointments.getAppointment, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-appointment, description: Create an appointment for an existing job, hints: { readOnly: false, destructive: false, idempotent: false }, call: jpm-appointments.createAppointment, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-reschedule-appointment, description: Reschedule an appointment, hints: { readOnly: false, destructive: false, idempotent: true }, call: jpm-appointments.rescheduleAppointment, with: { id: tools.id, body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
