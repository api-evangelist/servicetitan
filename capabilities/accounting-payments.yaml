naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Accounting API — Payments
  description: ServiceTitan Accounting — Payments. List, get, create, update.
  tags: [ServiceTitan, Accounting, Payments]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: accounting-payments
    baseUri: https://api.servicetitan.io
    resources:
    - name: payments
      path: /accounting/v2/{{env.SERVICETITAN_TENANT_ID}}/payments
      operations:
      - name: listPayments
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: modifiedOnOrAfter, in: query, type: string } ]
      - name: createPayment
        method: POST
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: body, in: body, type: object, required: true } ]
    - name: payment-by-id
      path: /accounting/v2/{{env.SERVICETITAN_TENANT_ID}}/payments/{id}
      operations:
      - name: getPayment
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: id, in: path, type: integer, required: true } ]
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: accounting-payments-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-payments, description: List payments, hints: { readOnly: true, destructive: false, idempotent: true }, call: accounting-payments.listPayments, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-payment, description: Get a payment, hints: { readOnly: true, destructive: false, idempotent: true }, call: accounting-payments.getPayment, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-payment, description: Create a payment, hints: { readOnly: false, destructive: false, idempotent: false }, call: accounting-payments.createPayment, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
