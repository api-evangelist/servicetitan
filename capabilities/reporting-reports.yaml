naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Reporting API — Reports
  description: ServiceTitan Reporting — Run custom reports and retrieve dynamic value sets.
  tags: [ServiceTitan, Reporting, Analytics]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: reporting-reports
    baseUri: https://api.servicetitan.io
    resources:
    - name: reports
      path: /reporting/v2/{{env.SERVICETITAN_TENANT_ID}}/reports
      operations:
      - name: listReports
        method: GET
        description: List available reports
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: category, in: query, type: string }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: reporting-reports-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-reports, description: List available reports, hints: { readOnly: true, destructive: false, idempotent: true }, call: reporting-reports.listReports, with: { category: tools.category }, outputParameters: [ { type: object, mapping: $. } ] }
