naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Job Booking & Capacity API — Call Reasons
  description: ServiceTitan JBCE — Call reasons for call intake.
  tags: [ServiceTitan, Job Booking, Call Reasons]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: jbce-call-reasons
    baseUri: https://api.servicetitan.io
    resources:
    - name: call-reasons
      path: /jbce/v2/{{env.SERVICETITAN_TENANT_ID}}/call-reasons
      operations:
      - name: listCallReasons
        method: GET
        description: List call reasons
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: modifiedOnOrAfter, in: query, type: string }
        - { name: active, in: query, type: string }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: jbce-call-reasons-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-call-reasons, description: List call reasons, hints: { readOnly: true, destructive: false, idempotent: true }, call: jbce-call-reasons.listCallReasons, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter, active: tools.active }, outputParameters: [ { type: object, mapping: $. } ] }
