naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Telecom API — Calls
  description: ServiceTitan Telecom — Call records and recordings.
  tags: [ServiceTitan, Telecom, Calls]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: telecom-calls
    baseUri: https://api.servicetitan.io
    resources:
    - name: calls
      path: /telecom/v2/{{env.SERVICETITAN_TENANT_ID}}/calls
      operations:
      - name: listCalls
        method: GET
        description: List call records
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: modifiedOnOrAfter, in: query, type: string }
        - { name: direction, in: query, type: string }
    - name: calls-by-id
      path: /telecom/v2/{{env.SERVICETITAN_TENANT_ID}}/calls/{id}
      operations:
      - name: getCall
        method: GET
        description: Get a call record
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: telecom-calls-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-calls, description: List call records, hints: { readOnly: true, destructive: false, idempotent: true }, call: telecom-calls.listCalls, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter, direction: tools.direction }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-call, description: Get a call record, hints: { readOnly: true, destructive: false, idempotent: true }, call: telecom-calls.getCall, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
