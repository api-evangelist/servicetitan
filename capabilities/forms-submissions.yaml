naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Forms API — Submissions
  description: ServiceTitan Forms — Field-completed form submissions.
  tags: [ServiceTitan, Forms, Submissions]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: forms-submissions
    baseUri: https://api.servicetitan.io
    resources:
    - name: submissions
      path: /forms/v2/{{env.SERVICETITAN_TENANT_ID}}/submissions
      operations:
      - name: listSubmissions
        method: GET
        description: List form submissions
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: modifiedOnOrAfter, in: query, type: string }
        - { name: formIds, in: query, type: string }
    - name: submissions-by-id
      path: /forms/v2/{{env.SERVICETITAN_TENANT_ID}}/submissions/{id}
      operations:
      - name: getSubmission
        method: GET
        description: Get a form submission
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: forms-submissions-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-submissions, description: List form submissions, hints: { readOnly: true, destructive: false, idempotent: true }, call: forms-submissions.listSubmissions, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter, formIds: tools.formIds }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-submission, description: Get a form submission, hints: { readOnly: true, destructive: false, idempotent: true }, call: forms-submissions.getSubmission, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
