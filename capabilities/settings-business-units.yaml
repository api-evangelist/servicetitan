naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Settings API — Business Units
  description: ServiceTitan Settings — Business Units (profit centers).
  tags: [ServiceTitan, Settings, Business Units]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: settings-business-units
    baseUri: https://api.servicetitan.io
    resources:
    - name: business-units
      path: /settings/v2/{{env.SERVICETITAN_TENANT_ID}}/business-units
      operations:
      - name: listBusinessUnits
        method: GET
        description: List business units
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: modifiedOnOrAfter, in: query, type: string }
    - name: business-units-by-id
      path: /settings/v2/{{env.SERVICETITAN_TENANT_ID}}/business-units/{id}
      operations:
      - name: getBusinessUnit
        method: GET
        description: Get a business unit
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: settings-business-units-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-business-units, description: List business units, hints: { readOnly: true, destructive: false, idempotent: true }, call: settings-business-units.listBusinessUnits, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-business-unit, description: Get a business unit, hints: { readOnly: true, destructive: false, idempotent: true }, call: settings-business-units.getBusinessUnit, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
