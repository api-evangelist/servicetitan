naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Memberships API — Memberships
  description: ServiceTitan Memberships — Customer memberships.
  tags: [ServiceTitan, Memberships, Subscriptions]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: memberships-memberships
    baseUri: https://api.servicetitan.io
    resources:
    - name: memberships
      path: /memberships/v2/{{env.SERVICETITAN_TENANT_ID}}/memberships
      operations:
      - name: listMemberships
        method: GET
        description: List customer memberships
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: customerId, in: query, type: integer }
        - { name: modifiedOnOrAfter, in: query, type: string }
      - name: createMembership
        method: POST
        description: Create a customer membership
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: body, in: body, type: object, required: true }
    - name: memberships-by-id
      path: /memberships/v2/{{env.SERVICETITAN_TENANT_ID}}/memberships/{id}
      operations:
      - name: getMembership
        method: GET
        description: Get a membership
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
      - name: updateMembership
        method: PATCH
        description: Update a membership
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: memberships-memberships-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-memberships, description: List customer memberships, hints: { readOnly: true, destructive: false, idempotent: true }, call: memberships-memberships.listMemberships, with: { customerId: tools.customerId, modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-membership, description: Get a membership, hints: { readOnly: true, destructive: false, idempotent: true }, call: memberships-memberships.getMembership, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-membership, description: Create a customer membership, hints: { readOnly: false, destructive: false, idempotent: false }, call: memberships-memberships.createMembership, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-update-membership, description: Update a membership, hints: { readOnly: false, destructive: false, idempotent: false }, call: memberships-memberships.updateMembership, with: { id: tools.id, body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
