naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan JPM API — Jobs
  description: ServiceTitan Job Planning & Management — Jobs. List, get, create, update, cancel, hold, history.
  tags:
  - ServiceTitan
  - JPM
  - Jobs
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: jpm-jobs
    baseUri: https://api.servicetitan.io
    description: ServiceTitan JPM Jobs.
    resources:
    - name: jobs
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/jobs
      operations:
      - name: listJobs
        method: GET
        description: List Jobs
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: jobStatus, in: query, type: string }
        - { name: modifiedOnOrAfter, in: query, type: string }
        - { name: page, in: query, type: integer }
      - name: createJob
        method: POST
        description: Create Job
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: body, in: body, type: object, required: true }
    - name: job-by-id
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/jobs/{id}
      operations:
      - name: getJob
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: id, in: path, type: integer, required: true } ]
      - name: updateJob
        method: PATCH
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
    - name: job-cancel
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/jobs/{id}/cancel
      operations:
      - name: cancelJob
        method: PUT
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
    - name: job-hold
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/jobs/{id}/hold
      operations:
      - name: holdJob
        method: PUT
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: jpm-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for ServiceTitan JPM Jobs.
    tools:
    - { name: servicetitan-list-jobs, description: List service jobs, hints: { readOnly: true, destructive: false, idempotent: true }, call: jpm-jobs.listJobs, with: { jobStatus: tools.jobStatus, modifiedOnOrAfter: tools.modifiedOnOrAfter, page: tools.page }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-job, description: Get a job, hints: { readOnly: true, destructive: false, idempotent: true }, call: jpm-jobs.getJob, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-job, description: Create a job, hints: { readOnly: false, destructive: false, idempotent: false }, call: jpm-jobs.createJob, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-update-job, description: Update a job, hints: { readOnly: false, destructive: false, idempotent: false }, call: jpm-jobs.updateJob, with: { id: tools.id, body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-cancel-job, description: Cancel a job, hints: { readOnly: false, destructive: true, idempotent: true }, call: jpm-jobs.cancelJob, with: { id: tools.id, body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-hold-job, description: Place a job on hold, hints: { readOnly: false, destructive: false, idempotent: true }, call: jpm-jobs.holdJob, with: { id: tools.id, body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
