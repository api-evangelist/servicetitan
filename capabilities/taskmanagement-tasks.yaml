naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Task Management API — Tasks
  description: ServiceTitan Task Management — Internal tasks.
  tags: [ServiceTitan, Tasks, Workflow]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: taskmanagement-data
    baseUri: https://api.servicetitan.io
    resources:
    - name: data
      path: /taskmanagement/v2/{{env.SERVICETITAN_TENANT_ID}}/data
      operations:
      - name: listTasks
        method: GET
        description: List tasks
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: modifiedOnOrAfter, in: query, type: string }
      - name: createTask
        method: POST
        description: Create a task
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: body, in: body, type: object, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: taskmanagement-data-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-tasks, description: List tasks, hints: { readOnly: true, destructive: false, idempotent: true }, call: taskmanagement-data.listTasks, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-task, description: Create a task, hints: { readOnly: false, destructive: false, idempotent: false }, call: taskmanagement-data.createTask, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
