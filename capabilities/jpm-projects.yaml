naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan JPM API — Projects
  description: ServiceTitan JPM — Projects. List, get, create.
  tags:
  - ServiceTitan
  - JPM
  - Projects
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: jpm-projects
    baseUri: https://api.servicetitan.io
    resources:
    - name: projects
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/projects
      operations:
      - name: listProjects
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: modifiedOnOrAfter, in: query, type: string } ]
      - name: createProject
        method: POST
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: body, in: body, type: object, required: true } ]
    - name: project-by-id
      path: /jpm/v2/{{env.SERVICETITAN_TENANT_ID}}/projects/{id}
      operations:
      - name: getProject
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: id, in: path, type: integer, required: true } ]
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: jpm-projects-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-projects, description: List multi-job projects, hints: { readOnly: true, destructive: false, idempotent: true }, call: jpm-projects.listProjects, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-project, description: Get a project, hints: { readOnly: true, destructive: false, idempotent: true }, call: jpm-projects.getProject, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-project, description: Create a project, hints: { readOnly: false, destructive: false, idempotent: false }, call: jpm-projects.createProject, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
