naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Settings API — Employees
  description: ServiceTitan Settings — Employees (all internal users).
  tags: [ServiceTitan, Settings, Employees]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: settings-employees
    baseUri: https://api.servicetitan.io
    resources:
    - name: employees
      path: /settings/v2/{{env.SERVICETITAN_TENANT_ID}}/employees
      operations:
      - name: listEmployees
        method: GET
        description: List employees
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: modifiedOnOrAfter, in: query, type: string }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: settings-employees-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-employees, description: List employees, hints: { readOnly: true, destructive: false, idempotent: true }, call: settings-employees.listEmployees, with: { modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
