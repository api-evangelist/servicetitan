naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Dispatch API — Capacity
  description: ServiceTitan Dispatch — Capacity windows used by Scheduling Pro for slot recommendations.
  tags: [ServiceTitan, Dispatch, Capacity]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: dispatch-capacity
    baseUri: https://api.servicetitan.io
    resources:
    - name: capacity
      path: /dispatch/v2/{{env.SERVICETITAN_TENANT_ID}}/capacity
      operations:
      - name: getCapacity
        method: POST
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: body, in: body, type: object, required: true } ]
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: dispatch-capacity-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-get-capacity, description: Get available capacity windows for booking, hints: { readOnly: true, destructive: false, idempotent: true }, call: dispatch-capacity.getCapacity, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
