naftiko: 1.0.0-alpha2
info:
  label: ServiceTitan Pricebook API — Services
  description: ServiceTitan Pricebook — Services CRUD.
  tags: [ServiceTitan, Pricebook, Services]
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SERVICETITAN_ACCESS_TOKEN: SERVICETITAN_ACCESS_TOKEN
    SERVICETITAN_APP_KEY: SERVICETITAN_APP_KEY
    SERVICETITAN_TENANT_ID: SERVICETITAN_TENANT_ID
capability:
  consumes:
  - type: http
    namespace: pricebook-services
    baseUri: https://api.servicetitan.io
    resources:
    - name: services
      path: /pricebook/v2/{{env.SERVICETITAN_TENANT_ID}}/services
      operations:
      - name: listServices
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: active, in: query, type: boolean }
        - { name: modifiedOnOrAfter, in: query, type: string }
      - name: createService
        method: POST
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: body, in: body, type: object, required: true } ]
    - name: service-by-id
      path: /pricebook/v2/{{env.SERVICETITAN_TENANT_ID}}/services/{id}
      operations:
      - name: getService
        method: GET
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters: [ { name: id, in: path, type: integer, required: true } ]
      - name: updateService
        method: PATCH
        outputRawFormat: json
        outputParameters: [ { name: result, type: object, value: $. } ]
        inputParameters:
        - { name: id, in: path, type: integer, required: true }
        - { name: body, in: body, type: object, required: true }
    authentication:
      type: bearer
      value: '{{env.SERVICETITAN_ACCESS_TOKEN}}'
      placement: header
    headers:
      ST-App-Key: '{{env.SERVICETITAN_APP_KEY}}'
  exposes:
  - type: mcp
    namespace: pricebook-services-mcp
    port: 9090
    transport: http
    tools:
    - { name: servicetitan-list-pricebook-services, description: List pricebook services, hints: { readOnly: true, destructive: false, idempotent: true }, call: pricebook-services.listServices, with: { active: tools.active, modifiedOnOrAfter: tools.modifiedOnOrAfter }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-get-pricebook-service, description: Get a pricebook service, hints: { readOnly: true, destructive: false, idempotent: true }, call: pricebook-services.getService, with: { id: tools.id }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-create-pricebook-service, description: Create a pricebook service, hints: { readOnly: false, destructive: false, idempotent: false }, call: pricebook-services.createService, with: { body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
    - { name: servicetitan-update-pricebook-service, description: Update a pricebook service, hints: { readOnly: false, destructive: false, idempotent: false }, call: pricebook-services.updateService, with: { id: tools.id, body: tools.body }, outputParameters: [ { type: object, mapping: $. } ] }
